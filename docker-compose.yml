services:
  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: aggregator
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aggregator"]
      interval: 3s
      timeout: 3s
      retries: 5

  web:
    build: .
    container_name: web
    ports:
      - 8080:8080
    environment:
      ADDRESS: :8080
      GOOSE_DBSTRING: postgres://postgres:secret@db:5432/aggregator?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
